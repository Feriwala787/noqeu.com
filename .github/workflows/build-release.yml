name: Build & Release APK

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.1)'
        required: true
        default: '1.0.0'

jobs:
  build-apk:
    name: Build Flutter APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable
          cache: true

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Update pubspec version
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          BUILD=$(echo $GITHUB_RUN_NUMBER)
          sed -i "s/^version: .*/version: ${VERSION}+${BUILD}/" mobile/pubspec.yaml

      - name: Generate launcher icons
        run: |
          node -e "
          const fs = require('fs');
          // Minimal 1x1 purple PNG (base64)
          const sizes = {mdpi:48,hdpi:72,xhdpi:96,xxhdpi:144,xxxhdpi:192};
          // Purple square PNG bytes generated via Buffer
          const {createCanvas} = require('canvas') || {};
          // Fallback: copy a pre-built minimal PNG
          // We'll use a Node script to write raw PNG bytes
          const PNG_HEADER = Buffer.from('89504e470d0a1a0a','hex');
          " 2>/dev/null || true
          # Use Python to generate simple PNG icons
          python3 - <<'PYEOF'
          import struct, zlib, os
          def make_png(size, r, g, b):
              def chunk(name, data):
                  c = struct.pack('>I', len(data)) + name + data
                  return c + struct.pack('>I', zlib.crc32(name + data) & 0xffffffff)
              ihdr = struct.pack('>IIBBBBB', size, size, 8, 2, 0, 0, 0)
              raw = b''
              for _ in range(size):
                  row = b'\x00' + bytes([r, g, b] * size)
                  raw += row
              idat = zlib.compress(raw)
              return b'\x89PNG\r\n\x1a\n' + chunk(b'IHDR', ihdr) + chunk(b'IDAT', idat) + chunk(b'IEND', b'')
          sizes = {'mdpi':48,'hdpi':72,'xhdpi':96,'xxhdpi':144,'xxxhdpi':192}
          base = 'mobile/android/app/src/main/res'
          for dpi, sz in sizes.items():
              path = f'{base}/mipmap-{dpi}'
              os.makedirs(path, exist_ok=True)
              png = make_png(sz, 108, 99, 255)
              open(f'{path}/ic_launcher.png','wb').write(png)
              open(f'{path}/ic_launcher_round.png','wb').write(png)
              print(f'Generated {dpi} {sz}x{sz}')
          PYEOF

        working-directory: mobile
        run: flutter pub get

      - name: Flutter analyze
        working-directory: mobile
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build APK (release)
        working-directory: mobile
        run: |
          flutter build apk --release \
            --dart-define=API_BASE_URL=https://noqeu-backend.onrender.com/api \
            --dart-define=USE_MOCK_API=false

      - name: Build APK (split per ABI)
        working-directory: mobile
        run: |
          flutter build apk --release --split-per-abi \
            --dart-define=API_BASE_URL=https://noqeu-backend.onrender.com/api \
            --dart-define=USE_MOCK_API=false

      - name: Rename APKs
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          mv mobile/build/app/outputs/flutter-apk/app-release.apk \
             mobile/build/app/outputs/flutter-apk/noqeu-v${VERSION}-universal.apk
          mv mobile/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
             mobile/build/app/outputs/flutter-apk/noqeu-v${VERSION}-arm64.apk
          mv mobile/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk \
             mobile/build/app/outputs/flutter-apk/noqeu-v${VERSION}-arm32.apk
          mv mobile/build/app/outputs/flutter-apk/app-x86_64-release.apk \
             mobile/build/app/outputs/flutter-apk/noqeu-v${VERSION}-x86_64.apk

      - name: Generate release notes
        id: notes
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          cat <<EOF > release_notes.md
          ## NoQeu v${VERSION} 📱

          **Stop Waiting, Start Living.**

          ### What's included
          - 🔒 OTP phone login
          - ⚡ One-tap token booking
          - ⏱️ Live countdown timer for your slot
          - 🏪 QR scan to discover shops
          - 👨‍💼 Owner dashboard with queue management
          - 🚫 Strike enforcement system
          - 🌙 Dark theme with smooth animations

          ### Downloads
          | File | Architecture |
          |------|-------------|
          | \`noqeu-v${VERSION}-arm64.apk\` | Most modern Android phones (recommended) |
          | \`noqeu-v${VERSION}-arm32.apk\` | Older Android phones |
          | \`noqeu-v${VERSION}-x86_64.apk\` | Emulators / x86 devices |
          | \`noqeu-v${VERSION}-universal.apk\` | All devices (larger size) |

          ### Backend
          API: https://noqeu-backend.onrender.com
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: NoQeu v${{ steps.version.outputs.VERSION }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: |
            mobile/build/app/outputs/flutter-apk/noqeu-v${{ steps.version.outputs.VERSION }}-universal.apk
            mobile/build/app/outputs/flutter-apk/noqeu-v${{ steps.version.outputs.VERSION }}-arm64.apk
            mobile/build/app/outputs/flutter-apk/noqeu-v${{ steps.version.outputs.VERSION }}-arm32.apk
            mobile/build/app/outputs/flutter-apk/noqeu-v${{ steps.version.outputs.VERSION }}-x86_64.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
